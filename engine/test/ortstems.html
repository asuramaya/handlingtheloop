<!doctype html>
<meta charset="utf-8" />
<title>ort stems stress</title>
<pre id="out">running…</pre>
<script type="module">
  // Stress-run the REAL Open-Unmix ONNX pipeline in this browser: 3 min of stereo
  // at 44.1k through the same chunked STFT→ONNX→softmask→ISTFT path the app uses.
  // Goal: confirm it completes without crashing and stays in a sane memory envelope.
  const out = document.getElementById("out");
  const NFFT = 4096, HOP = 1024, BINS = NFFT / 2 + 1, SR = 44100;
  const TARGETS = ["vocals", "drums", "bass", "other"];
  const CHUNK = 8 * SR, OVERLAP = Math.round(0.75 * SR), HOPC = CHUNK - OVERLAP;

  class FFT {
    constructor(n){this.n=n;const L=Math.log2(n);this.rev=new Uint32Array(n);for(let i=0;i<n;i++){let x=i,r=0;for(let j=0;j<L;j++){r=(r<<1)|(x&1);x>>=1;}this.rev[i]=r>>>0;}this.cos=new Float32Array(n/2);this.sin=new Float32Array(n/2);for(let i=0;i<n/2;i++){this.cos[i]=Math.cos(-2*Math.PI*i/n);this.sin[i]=Math.sin(-2*Math.PI*i/n);}}
    transform(re,im,inv=false){const n=this.n,rev=this.rev;for(let i=0;i<n;i++){const j=rev[i];if(j>i){let t=re[i];re[i]=re[j];re[j]=t;t=im[i];im[i]=im[j];im[j]=t;}}for(let len=2;len<=n;len<<=1){const h=len>>1,st=n/len;for(let i=0;i<n;i+=len)for(let k=0,idx=0;k<h;k++,idx+=st){const wr=this.cos[idx],wi=inv?-this.sin[idx]:this.sin[idx],a=i+k,b=a+h,xr=re[b]*wr-im[b]*wi,xi=re[b]*wi+im[b]*wr;re[b]=re[a]-xr;im[b]=im[a]-xi;re[a]+=xr;im[a]+=xi;}}if(inv){const v=1/n;for(let i=0;i<n;i++){re[i]*=v;im[i]*=v;}}}
  }
  const fft = new FFT(NFFT);
  const WIN = new Float32Array(NFFT);
  for (let i = 0; i < NFFT; i++) WIN[i] = 0.5 - 0.5 * Math.cos((2 * Math.PI * i) / NFFT);
  const pad = (x, p) => { const n = x.length, o = new Float32Array(n + 2 * p); o.set(x, p); for (let i = 0; i < p; i++){ o[p-1-i]=x[i+1]; o[p+n+i]=x[n-2-i]; } return o; };
  function stft(x){ const xp=pad(x,NFFT/2), nf=1+Math.floor(x.length/HOP); const re=new Float32Array(BINS*nf), im=new Float32Array(BINS*nf), fr=new Float32Array(NFFT), fi=new Float32Array(NFFT); for(let t=0;t<nf;t++){const off=t*HOP; for(let i=0;i<NFFT;i++){fr[i]=xp[off+i]*WIN[i];fi[i]=0;} fft.transform(fr,fi,false); for(let b=0;b<BINS;b++){re[b*nf+t]=fr[b];im[b*nf+t]=fi[b];}} return {re,im,nf}; }
  function istft(re,im,nf,outLen){ const p=NFFT/2, full=(nf-1)*HOP+NFFT, y=new Float32Array(full), ws=new Float32Array(full), fr=new Float32Array(NFFT), fi=new Float32Array(NFFT); for(let t=0;t<nf;t++){for(let b=0;b<BINS;b++){fr[b]=re[b*nf+t];fi[b]=im[b*nf+t];}for(let b=1;b<NFFT/2;b++){fr[NFFT-b]=re[b*nf+t];fi[NFFT-b]=-im[b*nf+t];}fft.transform(fr,fi,true);const off=t*HOP;for(let i=0;i<NFFT;i++){y[off+i]+=fr[i]*WIN[i];ws[off+i]+=WIN[i]*WIN[i];}} const o=new Float32Array(outLen); for(let i=0;i<outLen;i++){const d=ws[p+i];o[i]=d>1e-8?y[p+i]/d:0;} return o; }

  try {
    const ort = await import("https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.webgpu.min.mjs");
    ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/";
    const threads = self.crossOriginIsolated ? Math.min(navigator.hardwareConcurrency || 4, 8) : 1;
    ort.env.wasm.numThreads = threads;
    const suffix = new URLSearchParams(location.search).get("int8") === "1" ? ".int8" : "";
    const sess = {};
    for (const t of TARGETS) sess[t] = await ort.InferenceSession.create(`/public/models/openunmix/${t}${suffix}.onnx`, { executionProviders: ["wasm"] });

    // 3 min synthetic stereo
    const N = SR * 180;
    const full = [new Float32Array(N), new Float32Array(N)];
    for (let c = 0; c < 2; c++) for (let i = 0; i < N; i++) full[c][i] = 0.25 * Math.sin(2*Math.PI*(150+50*c)*i/SR) + 0.15 * Math.sin(2*Math.PI*1200*i/SR);

    const acc = {}; for (const t of TARGETS) acc[t] = [new Float32Array(N), new Float32Array(N)];
    const nchunks = N <= CHUNK ? 1 : Math.ceil((N - OVERLAP) / HOPC);
    const t0 = performance.now();
    let peakHeap = 0;
    for (let ci = 0; ci < nchunks; ci++) {
      const start = ci * HOPC, end = Math.min(N, start + CHUNK), segLen = end - start;
      const ch = [full[0].slice(start, end), full[1].slice(start, end)];
      const specs = ch.map(stft); const nf = specs[0].nf, stride = BINS * nf;
      const mag = new Float32Array(2 * stride);
      for (let c = 0; c < 2; c++){ const s=specs[c], base=c*stride; for (let k=0;k<stride;k++) mag[base+k]=Math.hypot(s.re[k],s.im[k]); }
      const ests = {};
      for (const t of TARGETS){ const r = await sess[t].run({ mag: new ort.Tensor("float32", mag, [1,2,BINS,nf]) }); ests[t] = r.est.data; }
      const denom = new Float32Array(2*stride);
      for (const t of TARGETS){ const e=ests[t]; for (let k=0;k<denom.length;k++) denom[k]+=e[k]*e[k]; }
      for (let k=0;k<denom.length;k++) denom[k]+=1e-10;
      for (const t of TARGETS){ const e=ests[t]; for (let c=0;c<2;c++){ const base=c*stride, mre=new Float32Array(stride), mim=new Float32Array(stride); for (let k=0;k<stride;k++){const m=(e[base+k]*e[base+k])/denom[base+k]; mre[k]=m*specs[c].re[k]; mim[k]=m*specs[c].im[k];} const o=istft(mre,mim,nf,segLen); const dst=acc[t][c]; for (let i=0;i<segLen;i++){let w=1; if(ci>0&&i<OVERLAP)w=i/OVERLAP; else if(end<N&&i>=segLen-OVERLAP)w=(segLen-i)/OVERLAP; dst[start+i]+=o[i]*w;} } }
      if (performance.memory) peakHeap = Math.max(peakHeap, performance.memory.usedJSHeapSize);
      await new Promise(r => setTimeout(r, 0));
    }
    // finiteness check
    let maxAbs = 0, nan = false;
    for (const t of TARGETS) for (let c=0;c<2;c++){ const a=acc[t][c]; for (let i=0;i<a.length;i+=37){ const v=a[i]; if(!Number.isFinite(v)){nan=true;break;} if(Math.abs(v)>maxAbs)maxAbs=Math.abs(v);} }
    out.textContent = "RESULT " + JSON.stringify({
      pass: !nan && maxAbs > 0 && maxAbs < 8,
      coi: self.crossOriginIsolated, threads,
      nchunks, seconds: +((performance.now()-t0)/1000).toFixed(1),
      peakHeapMB: peakHeap ? Math.round(peakHeap/1048576) : null,
      maxAbs: +maxAbs.toFixed(3), nan,
    });
    document.title = "DONE";
  } catch (e) {
    out.textContent = "RESULT " + JSON.stringify({ pass: false, error: String(e && e.stack ? e.stack : e) });
    document.title = "DONE";
  }
</script>
