<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050507" />
    <!-- Launch full-screen (no browser chrome) when added to the home screen. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HTL" />
    <title>Handling The Loop</title>
    <style>
      html,
      body {
        background: #050507;
        height: 100%;
        margin: 0;
        /* Lock the page against rubber-band scroll + pinch-zoom (the waveform owns
           those gestures) — WITHOUT position:fixed, which pins content behind the
           iOS toolbar. Inner panels (the explorer list) still scroll. */
        overscroll-behavior: none;
        touch-action: manipulation;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
